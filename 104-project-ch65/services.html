<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/registration.css" />
    <title>Document</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Pet Salon</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="registration.HTML">Registration</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="services.html">Services</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="d-flex justify-content-end m-3">
        <button id="changeModeButton" class="btn btn-light">🌞</button>
      </div>
    </nav>
    <br />

    <form id="servicesForm" class="container m-5">
      <div class="mb-3">
        <label class="form-label p-2" for="servicename">Service</label>
        <input class="form-control" type="text" id="servicename" />
      </div>
      <div class="mb-3">
        <label class="form-label p-2" for="servicename">Description</label>
        <input
          class="form-control"
          type="text"
          name=""
          id="serviceDescription"
        />
      </div>

      <div class="md-3">
        <label class="form-label p-2" for="serviceprice">price</label>
        <input class="form-control" type="text" name="" id="servicePrice" />
      </div>
      <div class="d-flex justify-content-end">
        <button id="saveServiceButton" class="btn btn-success m-3" type="submit">Register</button>
        <button class="btn btn-secondary m-3" type="reset">Reset</button>
      </div>

      <br />
      <!-- <h2 class="display-5 m-3">Our Services</h2> -->

      <div class="img1 d-flex justify-content-center" style="width: 100%; height: 30vh;">
        <img
          src="anim.jpg"
          class="object-fit-xl-contain border rounded"
          alt=""
        />
      </div>

      
      <br />


      

      <div class="mt-3 p-4 bg-light " style="height: 20vh;">
        <h3>New Service:</h3>
        <p id="result"></p>
        </div>

         <button class="btn btn-secondary m-3" id="getBtn">New item</button>

      <br />

      <div class="form-select mb-3">
        <h2>Services</h2>
        <br />

        <select
          class="form-select form-select-sm mb-3"
          id="select-service"
          name="service"
          required
        >
          <option value="" disabled selected>Select service</option>
          <option
            value="grooming"
            data-description=" Includes bath, cut, blow dry, brush out, nail trim and ear cleaning."
            data-price="$90.00"
          >
            Grooming
          </option>
          <option
            value="bath and brush"
            data-description="Basic service covering bath, dry, brush, nails, and ear cleaning."
            data-price="$70.00"
          >
            bath and brush
          </option>
          <option
            value="training"
            data-description="specific skills, behaviors, and rules to successfully navigate a human-centered environment, 6 weeks class."
            data-price="$260"
          >
            Training
          </option>
          <option
            value="veterinary"
            data-description="routine preventive check-ups and vaccinations to diagnostics, surgery, and emergency treatment."
            data-price="$60.00"
          >
            Veterinary
          </option>
        </select>
        <br />
        <div id="data-description" class="form-select">
          <p id="data-description"></p>
        </div>
        <br />

        <div id="data-price">
          <p id="price"></p>
        </div>
        <br />
        
      </div>

      <h3>About Us</h3>
      <div class="card" style="width: 28rem ; height: 10vh;">
        <img src="owner.jpgg.png" class="card-img-top" alt="" />
        <div class="card-body ">
          <p class="card-text ">Satifation guaranty from our family to yours!</p>
        </div>
      </div>
      
    </form>

    
   

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="scripts/jQuery-services.js"></script>
  </body>
</html>
