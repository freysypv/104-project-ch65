<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <title>Local Storage

    </title>
</head>
<body>
    <section class="container mt-5">
        <h1>Local Storage: save, get, and delete data</h1>
        <form class="container mt-5">
            <div class="input-group mb-3">
                <label class="input-group-text">username</label>
                <input type="text" name="username" class="form-control" id="username" placeholder="fer123"> 
            </div>
                
                <div class="input-group mb-3 "> 
                    <label class="form-label" for="name" id="name">Name</label>
                     <input type="text" id="nameInput" class="form-control">
                </div>
                <div class="input-group mb-3 "> 
                    <label class="form-label" for="age" id="age">Age</label>
                     <input type="text" id="ageInput" class="form-control">
                </div>
                <div class="input-group mb-3 "> 
                    <label class="form-label" for="pass" id="pass">Password</label>
                     <input type="text" id="passwordInput" class="form-control">
                </div>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-primary m-1" id="saveBtn">Save</button>
                    <button class="btn btn-secondary m-1" id="getBtn">Get</button>
                    <button class="btn btn-danger m-1" id="deleteBtn">Delete</button>
                </div>


        </form>

        <div class="mt-3 p-4 bg-light " style="height: 30vh;">
        <h1>Result:</h1>
        <p id="result"></p>
        </div>

    </section>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/localstorage.js"></script>
</body>
</html>
